name: Build Android Debug APK
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'APK version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22.12.0'
        cache: 'yarn'
        cache-dependency-path: 'Mangatan-WebUI/yarn.lock'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Android SDK components
      run: |
        yes | sdkmanager --licenses
        sdkmanager "platforms;android-29" "platforms;android-26" "build-tools;30.0.3" "ndk;26.1.10909125"
    
    - name: Set Android environment variables
      run: |
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
    
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android,armv7-linux-androideabi
    
    - name: Cache cargo-apk2
      id: cache-cargo-apk2
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/cargo-apk2
        key: cargo-apk2-${{ runner.os }}
    
    - name: Install cargo-apk2
      if: steps.cache-cargo-apk2.outputs.cache-hit != 'true'
      run: cargo install --git https://github.com/kolbyml/cargo-apk2
    
    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "bin/mangatan_android"
    
    - name: Prepare Assets
      run: |
        make android_webui
        make download_android_jar
        make download_android_jre
        make android_icon
    
    - name: Build Native Webview APK (Debug)
      working-directory: bin/mangatan_android
      run: |
        NDK_ROOT=${ANDROID_NDK_HOME}
        if [ -z "$NDK_ROOT" ]; then
          NDK_ROOT=$(ls -d /usr/local/lib/android/sdk/ndk/* | sort -V | tail -n1)
        fi
        echo "Using NDK at: $NDK_ROOT"

        TOOLCHAIN_BIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"

        export RANLIB="$TOOLCHAIN_BIN/llvm-ranlib"
        export AR="$TOOLCHAIN_BIN/llvm-ar"
        
        # CONFIG FOR AARCH64 (64-bit)
        export CC_aarch64_linux_android="$TOOLCHAIN_BIN/aarch64-linux-android30-clang"
        export CXX_aarch64_linux_android="$TOOLCHAIN_BIN/aarch64-linux-android30-clang++"
        export AR_aarch64_linux_android="$TOOLCHAIN_BIN/llvm-ar"
        
        # CONFIG FOR ARMV7 (32-bit)
        export CC_armv7_linux_androideabi="$TOOLCHAIN_BIN/armv7a-linux-androideabi30-clang"
        export CXX_armv7_linux_androideabi="$TOOLCHAIN_BIN/armv7a-linux-androideabi30-clang++"
        export AR_armv7_linux_androideabi="$TOOLCHAIN_BIN/llvm-ar"

        echo "🏗️ Building Native Webview Version (Debug)..."
        cargo apk2 build --features native_webview
    
    - name: Rename APK with version
      run: |
        APK_PATH=$(find target -name "*.apk" | grep "debug/apk" | head -n 1)
        mv "$APK_PATH" mangatan-android-debug-native-webview-${{ inputs.version }}.apk
    
    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mangatan-android-debug-${{ inputs.version }}
        path: mangatan-android-debug-native-webview-${{ inputs.version }}.apk
        retention-days: 30
