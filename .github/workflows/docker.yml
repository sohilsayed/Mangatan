name: Docker Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to build from (e.g., v1.0.5)"
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  push_to_registry:
    name: Build & Push Docker Image
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.action == 'published' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve Release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ inputs.tag_name }}"

          if [[ -z "$TAG_NAME" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          fi

          if [[ -z "$TAG_NAME" || "$TAG_NAME" == "null" ]]; then
            echo "Could not determine release tag" >&2
            exit 1
          fi

          PRERELEASE="${{ github.event.release.prerelease }}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            PRERELEASE=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG_NAME" --jq '.prerelease')
          fi

          PUSH_LATEST=true
          if [[ "$PRERELEASE" == "true" ]]; then
            PUSH_LATEST=false
          fi

          echo "Building Docker image for $TAG_NAME"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "push_latest=$PUSH_LATEST" >> $GITHUB_OUTPUT

      - name: Download Linux Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_NAME="${{ steps.release.outputs.tag }}"
          mkdir -p download_amd64 download_arm64

          download_asset() {
            local pattern="$1"
            local directory="$2"

            for attempt in {1..10}; do
              if gh release download "$TAG_NAME" \
                --repo "${{ github.repository }}" \
                --pattern "$pattern" \
                --dir "$directory"; then
                return 0
              fi

              echo "Asset $pattern is not available yet (attempt $attempt/10)"
              sleep 30
            done

            echo "Failed to download release asset: $pattern" >&2
            return 1
          }

          download_asset "Manatan-${TAG_NAME}-Linux-amd64.tar.gz" download_amd64
          download_asset "Manatan-${TAG_NAME}-Linux-arm64.tar.gz" download_arm64

          ls -lh download_amd64
          ls -lh download_arm64

      - name: Prepare Context
        run: |
          cp download_amd64/*.tar.gz manatan-linux-amd64.tar.gz
          cp download_arm64/*.tar.gz manatan-linux-arm64.tar.gz

          ls -lh *.tar.gz

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.release.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.release.outputs.push_latest == 'true' }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
